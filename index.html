<!DOCTYPE html>
<html>
<head>
  <title>Pocket</title>

  <link rel="apple-touch-icon" sizes="1024x1024"
  href="https://chiragpawar2.github.io/Pocket-App-Icon/icon.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .btn {
      background: #F51D00;
      color: #fff;
      padding: 16px 40px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 999px; /* pill shape */
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      letter-spacing: 0.5px;

      /* glow effect */
      box-shadow: 0 8px 25px rgba(245, 29, 0, 0.4),
                  0 0 12px rgba(245, 29, 0, 0.6);

      transition: all 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(245, 29, 0, 0.5),
                  0 0 18px rgba(245, 29, 0, 0.8);
    }

    .btn:active {
      transform: scale(0.96);
      box-shadow: 0 6px 15px rgba(245, 29, 0, 0.3);
    }
  </style>
</head>

<body>

<a href="https://www.pocketfm.com" class="btn">
  Open Pocket
</a>

</body>
</html>
